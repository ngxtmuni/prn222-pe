<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Service List</title>
</head>
<body>
    <h2>Service List</h2>

    <form method="get">
        <div>
            <label>Room Title</label>
            <input type="text" name="RoomTitle" />
        </div>
        <div>
            <label>Fee Type</label>
            <input type="text" name="FeeType" />
        </div>
        <button type="submit">Search</button>
    </form>

    <table border="1" cellpadding="6" cellspacing="0">
        <thead>
            <tr>
                <th>Room Title</th>
                <th>Fee Type</th>
                <th>Price</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><a href="">Deluxe Room</a></td>
                <td>Daily</td>
                <td>35.00</td>
                <td>Available</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
